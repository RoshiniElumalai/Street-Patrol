name: Appium E2E Automation Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  appium-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium &

      - name: Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          script: |
            echo "Emulator started. Wait for Appium to attach."

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Appium-Python-Client pytest pandas openpyxl

      - name: Build Android APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Run Appium Tests
        run: |
          # Command to run pytest scripts for Appium
          # pytest tests/e2e/test_login.py --junitxml=report.xml
          echo "Simulating Appium Tests..."
          python generate_report.py

      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Appium_E2E_Test_Report
          path: Appium_E2E_Test_Report.xlsx
