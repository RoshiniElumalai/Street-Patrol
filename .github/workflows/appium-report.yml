name: 📱 Appium Mobile E2E Test Report

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'Rohithnayini09@gmail.com'

permissions:
  contents: write
  actions: write

jobs:
  appium-test-report:
    name: Generate Appium E2E Excel Report
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Frontend Dependencies
        run: npm ci

      - name: 📱 Run Appium CSV to XLSX Converter
        run: node convert_appium.cjs

      - name: 📊 Upload Appium E2E Report (Excel)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Mobile-E2E-Report-${{ github.run_number }}
          path: Vulnerability Test Results/Appium_E2E_Test_Report_Final.xlsx
          retention-days: 30

      - name: 📤 Commit Appium E2E Excel Report to Repository
        if: github.event_name == 'push'
        run: |
          git config --local user.email "Rohithnayini09@gmail.com"
          git config --local user.name "Rohithnayini"
          git add "Vulnerability Test Results/Appium_E2E_Test_Report_Final.xlsx"
          if git diff --staged --quiet; then
            echo "No changes in report — skipping commit."
          else
            git commit -m "ci: auto-update Appium E2E Excel report [run #${{ github.run_number }}] [skip ci]"
            for i in {1..5}; do
              git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }} && exit 0 || sleep 5
            done

            exit 1
          fi


